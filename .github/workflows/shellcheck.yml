name: ShellCheck
on:
  push:
    paths:
      - 'src/build/**'
      - '.github/workflows/shellcheck.yml'
  pull_request:
  workflow_dispatch:
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on installer scripts
        run: |
          shellcheck --version
          shellcheck src/build/build.sh src/build/scripts/preinstall src/build/scripts/postinstall
